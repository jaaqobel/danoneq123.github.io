<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Przykłady JS: if/else, switch, pętle + Tester komend</title>
  <style>
    html {
      text-align: center;
      color: red;
      font-size: 20px;
      font-family: "Lato", sans-serif;
      background-color: #121212; /* ciemne tło */
      
      /* Tło w paski - efekt dekoracyjny */
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.05),
        rgba(255, 255, 255, 0.05) 10px,
        transparent 10px,
        transparent 20px
      );
      background-repeat: repeat;
      background-size: 40px 40px;

      color: white; /* kolor tekstu */
    }

    a {
      text-decoration: none; /* usuwa podkreślenie z linków */
      color: white;
    }

    h1 {
      font-size: 54px;
      font-weight: bold;
    }

    /* Panel sterowania – np. dla trybu wysokiego kontrastu */
    #controlBox {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 140px;
      background: #000;
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-family: Arial, sans-serif;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      z-index: 9999;
      user-select: none;
    }

    #controlBox button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    #controlBox button:hover {
      background: #555;
    }

    .high-contrast {
      background-color: #000 !important;
      color: #fff !important;
    }
    .high-contrast a {
      color: #0ff !important;
    }

    /* Dodatkowy styl dla panelu testowego */
    #js-tester {
      margin: 30px auto 50px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      font-family: monospace;
      text-align: left;
      color: #0ff;
    }

    #js-tester label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
      color: #0ff;
    }

    #js-command {
      width: 100%;
      height: 80px;
      font-size: 16px;
      background: #121212;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 4px;
      padding: 6px;
      resize: vertical;
      font-family: monospace;
    }

    #run-command {
      margin-top: 10px;
      width: 100%;
      background: #0ff;
      border: none;
      padding: 10px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      transition: background 0.3s;
    }

    #run-command:hover {
      background: #0cc;
    }

    #command-output {
      margin-top: 15px;
      background: #000;
      border: 1px solid #0ff;
      padding: 10px;
      height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      color: #0ff;
      border-radius: 4px;
    }

  </style>
</head>
<body>

  <h1>Instrukcje Warunkowe i Pętle w JavaScript</h1>

  <h2>1. Instrukcja <code>if...else</code></h2>
  <pre id="if-else-output"></pre>

  <h2>2. Instrukcja <code>switch</code></h2>
  <pre id="switch-output"></pre>

  <h2>3. Pętla <code>for</code></h2>
  <pre id="for-output"></pre>

  <h2>4. Pętla <code>while</code></h2>
  <pre id="while-output"></pre>

  <h2>5. Pętla <code>do...while</code></h2>
  <pre id="do-while-output"></pre>

  <!-- PANEL TESTERA KOMEND JS -->
  <div id="js-tester">
    <label for="js-command">Wpisz komendę JavaScript i kliknij "Uruchom komendę":</label>
    <textarea id="js-command" placeholder="np. 2 + 2"></textarea>
    <button id="run-command">Uruchom komendę</button>
    <div id="command-output" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script>
    // Twoje poprzednie przykłady

    // 1. IF...ELSE
    let number = 10;
    let ifElseResult = '';
    if (number > 0) {
      ifElseResult = "Liczba jest dodatnia.";
    } else if (number < 0) {
      ifElseResult = "Liczba jest ujemna.";
    } else {
      ifElseResult = "Liczba jest równa zero.";
    }
    document.getElementById("if-else-output").textContent = ifElseResult;

    // 2. SWITCH
    let day = 3;
    let dayName;
    switch (day) {
      case 1:
        dayName = "Poniedziałek";
        break;
      case 2:
        dayName = "Wtorek";
        break;
      case 3:
        dayName = "Środa";
        break;
      case 4:
        dayName = "Czwartek";
        break;
      case 5:
        dayName = "Piątek";
        break;
      default:
        dayName = "Weekend";
    }
    document.getElementById("switch-output").textContent = "Dzień tygodnia: " + dayName;

    // 3. FOR
    let forResult = '';
    for (let i = 1; i <= 5; i++) {
      forResult += "Liczba: " + i + "\n";
    }
    document.getElementById("for-output").textContent = forResult;

    // 4. WHILE
    let whileResult = '';
    let w = 1;
    while (w <= 5) {
      whileResult += "Iteracja: " + w + "\n";
      w++;
    }
    document.getElementById("while-output").textContent = whileResult;

    // 5. DO...WHILE
    let doWhileResult = '';
    let d = 1;
    do {
      doWhileResult += "Licznik: " + d + "\n";
      d++;
    } while (d <= 5);
    document.getElementById("do-while-output").textContent = doWhileResult;

    // ANIMACJA KOLORU NAGŁÓWKA h1
    function animateH1Color() {
      const h1 = document.querySelector('h1');
      let r = 0, g = 0, b = 0;
      let step = 1;
      setInterval(() => {
        r = (r + step) % 256;
        g = (g + step * 2) % 256;
        b = (b + step * 3) % 256;
        h1.style.color = `rgb(${r}, ${g}, ${b})`;
      }, 30);
    }
    animateH1Color();

    // --- OBSŁUGA TESTERA KOMEND ---
    const runBtn = document.getElementById('run-command');
    const commandInput = document.getElementById('js-command');
    const output = document.getElementById('command-output');

    runBtn.addEventListener('click', () => {
      const code = commandInput.value.trim();
      if (!code) {
        output.textContent = 'Wpisz jakąś komendę JavaScript.';
        return;
      }
      try {
        // eval wykonuje wpisany kod JS (uwaga - potencjalnie niebezpieczne!)
        const result = eval(code);
        output.textContent = `Wynik: ${result}`;
      } catch (err) {
        // Jeżeli błąd w kodzie, wyświetlamy go
        output.textContent = `Błąd: ${err.message}`;
      }
    });
  </script>

</body>
</html>
