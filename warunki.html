<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Przykłady JS: if/else, switch, pętle</title>
   <style>
    html{  
    text-align:center;
      color:red;
      font-size:35px;
      font-family: "Lato", sans-serif;
      background-color: #121212; /* bardzo ciemne tło */
  background-image: repeating-linear-gradient(
    45deg,                /* kąt pasków */
    rgba(255, 255, 255, 0.05), /* jasne paski, bardzo subtelne */
    rgba(255, 255, 255, 0.05) 10px,
    transparent 10px,
    transparent 20px
  );
  background-repeat: repeat;
  background-size: 40px 40px; /* rozmiar wzoru */
  color: white; /* dla czytelności tekstu */

    
      }
   

    a{
      text-decoration:none;
      color:white;
      }
    h1{
      color:#47d6ca;
       font-size:54px;
  
      }
   #controlBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 140px;
    background: #000;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    z-index: 9999;
    user-select: none;
  }
  #controlBox button {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #controlBox button:hover {
    background: #555;
  }
  /* Wysoki kontrast */
  .high-contrast {
    background-color: #000 !important;
    color: #fff !important;
  }
  .high-contrast a {
    color: #0ff !important;
  }
    </style>
</head>
<body>

  <h1>Instrukcje Warunkowe i Pętle w JavaScript</h1>

  <h2>1. Instrukcja <code>if...else</code></h2>
  <pre id="if-else-output"></pre>

  <h2>2. Instrukcja <code>switch</code></h2>
  <pre id="switch-output"></pre>

  <h2>3. Pętla <code>for</code></h2>
  <pre id="for-output"></pre>

  <h2>4. Pętla <code>while</code></h2>
  <pre id="while-output"></pre>

  <h2>5. Pętla <code>do...while</code></h2>
  <pre id="do-while-output"></pre>

  <script>
    // 1. IF...ELSE
    let number = 10;
    let ifElseResult = '';
    if (number > 0) {
      ifElseResult = "Liczba jest dodatnia.";
    } else if (number < 0) {
      ifElseResult = "Liczba jest ujemna.";
    } else {
      ifElseResult = "Liczba jest równa zero.";
    }
    document.getElementById("if-else-output").textContent = ifElseResult;

    // 2. SWITCH
    let day = 3;
    let dayName;
    switch (day) {
      case 1:
        dayName = "Poniedziałek";
        break;
      case 2:
        dayName = "Wtorek";
        break;
      case 3:
        dayName = "Środa";
        break;
      case 4:
        dayName = "Czwartek";
        break;
      case 5:
        dayName = "Piątek";
        break;
      default:
        dayName = "Weekend";
    }
    document.getElementById("switch-output").textContent = "Dzień tygodnia: " + dayName;

    // 3. FOR
    let forResult = '';
    for (let i = 1; i <= 5; i++) {
      forResult += "Liczba: " + i + "\n";
    }
    document.getElementById("for-output").textContent = forResult;

    // 4. WHILE
    let whileResult = '';
    let w = 1;
    while (w <= 5) {
      whileResult += "Iteracja: " + w + "\n";
      w++;
    }
    document.getElementById("while-output").textContent = whileResult;

    // 5. DO...WHILE
    let doWhileResult = '';
    let d = 1;
    do {
      doWhileResult += "Licznik: " + d + "\n";
      d++;
    } while (d <= 5);
    document.getElementById("do-while-output").textContent = doWhileResult;
  </script>

</body>
</html>
