<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porównanie funkcji JS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin-top: 40px;
    }
    h2 {
      color: #333;
    }
    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: #0078d7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #005fa3;
    }
    .box {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border-radius: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      transition: all 0.4s ease;
    }
  </style>
</head>
<body>
  <h2>Porównanie funkcji w JavaScript</h2>

  <button onclick="pokazDeklaracja()">Deklaracja funkcji</button>
  <button id="btnWyrazenie">Wyrażenie funkcyjne</button>
  <button id="btnStrzalkowa">Funkcja strzałkowa</button>

  <div class="box" id="box">Kliknij przycisk 👆</div>

  <script>
    const box = document.getElementById("box");

    // 1️⃣ Deklaracja funkcji (można ją wywołać nawet PRZED definicją)
    function pokazDeklaracja() {
      box.style.transform = "rotate(0deg)";
      box.style.backgroundColor = "#a5d6a7";
      box.textContent = "Deklaracja: działa dzięki hoistingowi!";
    }

    // 2️⃣ Wyrażenie funkcyjne (musi być zdefiniowane zanim je użyjesz)
    const pokazWyrazenie = function() {
      const liczba = Math.floor(Math.random() * 100);
      box.style.backgroundColor = "#ffe082";
      box.textContent = `Wyrażenie: losowa liczba ${liczba}`;
    };
    document.getElementById("btnWyrazenie").addEventListener("click", pokazWyrazenie);

    // 3️⃣ Funkcja strzałkowa (nie ma swojego this)
    const pokazStrzalkowa = () => {
      // przykład różnicy w "this":
      box.style.transform = "rotate(360deg)";
      box.style.backgroundColor = "#90caf9";
      box.textContent = "Strzałkowa: nie ma własnego 'this'";
    };
    document.getElementById("btnStrzalkowa").addEventListener("click", pokazStrzalkowa);
  </script>
</body>
</html>
