<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porównanie funkcji w JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f3f6fa;
    }
    h2 {
      color: #333;
    }
    button {
      margin: 10px;
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #0078d7;
      color: white;
      transition: 0.3s;
    }
    button:hover {
      background-color: #005fa3;
    }
    #wynik {
      margin-top: 30px;
      padding: 15px 25px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: inline-block;
      min-width: 300px;
    }
  </style>
</head>
<body>

  <h2>Różne sposoby definiowania funkcji</h2>

  <button id="btnDeklaracja">Deklaracja funkcji</button>
  <button id="btnWyrazenie">Wyrażenie funkcyjne</button>
  <button id="btnStrzalkowa">Funkcja strzałkowa</button>

  <div id="wynik">Kliknij przycisk, aby zobaczyć różnicę 👇</div>

  <script>
    const wynik = document.getElementById("wynik");

    // 1️⃣ Deklaracja funkcji
    function pokazDeklaracja() {
      wynik.textContent = "✅ Deklaracja funkcji: dostępna nawet przed jej zdefiniowaniem (hoisting).";
      document.body.style.backgroundColor = "#e8f5e9";
    }

    // 2️⃣ Wyrażenie funkcyjne
    const pokazWyrazenie = function() {
      wynik.textContent = "🟡 Wyrażenie funkcyjne: nie ma hoistingu, ale można je przekazać do innych funkcji.";
      document.body.style.backgroundColor = "#fff8e1";
    };

    // 3️⃣ Funkcja strzałkowa (różni się this)
    const pokazStrzalkowa = () => {
      wynik.textContent = "🔥 Funkcja strzałkowa: krótsza składnia, ale nie ma własnego 'this'!";
      document.body.style.backgroundColor = "#e3f2fd";
    };

    // Przypisanie funkcji do przycisków
    document.getElementById("btnDeklaracja").addEventListener("click", pokazDeklaracja);
    document.getElementById("btnWyrazenie").addEventListener("click", pokazWyrazenie);
    document.getElementById("btnStrzalkowa").addEventListener("click", pokazStrzalkowa);
  </script>

</body>
</html>
