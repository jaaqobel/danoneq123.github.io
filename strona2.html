<!DOCTYPE html>

<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1" >
  <title>2025/2026</title>
  <style>
    html{  
      background: url("hallowen.gif") no-repeat center center fixed;
      background-size: cover; /* Dopasowanie rozmiaru tła do rozmiaru ekranu */
      height: 100%;
      width: 100%;
      text-align: center;
      font-size: 35px;
      font-family: "Lato", sans-serif;
    }
    a{
      text-decoration:none;
      color:white;
      }
    h1{
      color:red;
       font-size:54px;
  
      }
     
   #controlBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 140px;
    background: #000;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    z-index: 9999;
    user-select: none;
  }
  #controlBox button {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #controlBox button:hover {
    background: #555;
  }
  /* Wysoki kontrast */
  .high-contrast {
    background-color: #000 !important;
    color: #fff !important;
  }
  .high-contrast a {
    color: #0ff !important;
  }
    </style>
 <div id="controlBox">
  <button id="contrastBtn">Zmień kontrast</button>
  <button id="zoomInBtn">Powiększ +</button>
  <button id="zoomOutBtn">Zmniejsz -</button>
</div>

<script>
  (function(){
    let zoomLevel = 1;
    const zoomStep = 0.1;
    const minZoom = 0.5;
    const maxZoom = 3;

    const html = document.documentElement; // <html>
    const contrastBtn = document.getElementById('contrastBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');

    contrastBtn.addEventListener('click', () => {
      document.body.classList.toggle('high-contrast');
    });

    zoomInBtn.addEventListener('click', () => {
      if (zoomLevel < maxZoom) {
        zoomLevel = +(zoomLevel + zoomStep).toFixed(2);
        html.style.fontSize = (zoomLevel * 100) + '%';
      }
    });

    zoomOutBtn.addEventListener('click', () => {
      if (zoomLevel > minZoom) {
        zoomLevel = +(zoomLevel - zoomStep).toFixed(2);
        html.style.fontSize = (zoomLevel * 100) + '%';
      }
    });
  })();
</script>
