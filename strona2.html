<!-- PANEL STEROWANIA -->
<div id="controlBox">
    <label for="contrastRange" style="font-size:14px;">Kontrast</label>
    <input type="range" id="contrastRange" min="100" max="300" value="100">
</div>

<script>
(function() {
    const html = document.documentElement;
    const contrastRange = document.getElementById('contrastRange');

    // SUWAK KONTRASTU
    contrastRange.addEventListener('input', () => {
        const val = contrastRange.value;

        html.style.filter = `contrast(${val}%)`;

        // Przy mocnym kontraście dodaj invert
        if (val >= 200) {
            html.style.filter += " invert(1)";
        }
    });
})();
</script>
