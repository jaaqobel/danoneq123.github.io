<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operatory w PHP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2a2b3c; /* Nowoczesne ciemno-niebieskie tło */
            color: #f1f1f1;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1, h2 {
            color: #fff;
        }

        .section {
            margin-bottom: 30px;
        }

        .toggle-button {
            background: #3b67a2;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            color: #fff;
            font-size: 18px;
            transition: background 0.3s ease;
        }

        .toggle-button:hover {
            background: #285285;
        }

        .toggle-button:active {
            background: #1f3f6e;
        }

        .input-container {
            margin-top: 20px;
            display: none;
            background-color: #3c4551;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .input-container input {
            padding: 10px;
            width: 80%;
            font-size: 16px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #666;
            background-color: #fff;
            color: #333;
        }

        .input-container button {
            padding: 10px 20px;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
        }

        .input-container button:hover {
            background-color: #45a049;
        }

        .output {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background-color: #444;
            color: #0ff;
            font-size: 18px;
            display: none;
        }

    </style>
</head>
<body>

    <h1>Operatory w PHP</h1>

    <!-- Operatory Arytmetyczne -->
    <div class="section">
        <h2>1. Operatory arytmetyczne</h2>
        <button class="toggle-button" onclick="toggleInput('arithmetics')">Oblicz sumę i różnicę</button>
        <div id="arithmetics" class="input-container">
            <input type="number" id="num1" placeholder="Podaj liczbę A" />
            <input type="number" id="num2" placeholder="Podaj liczbę B" />
            <button onclick="calculateArithmetic()">Oblicz</button>
        </div>
        <div id="arithmetics-output" class="output"></div>
    </div>

    <!-- Operatory Porównania -->
    <div class="section">
        <h2>2. Operatory porównania</h2>
        <button class="toggle-button" onclick="toggleInput('comparison')">Porównaj liczby</button>
        <div id="comparison" class="input-container">
            <input type="number" id="comp1" placeholder="Podaj liczbę A" />
            <input type="number" id="comp2" placeholder="Podaj liczbę B" />
            <button onclick="compareNumbers()">Porównaj</button>
        </div>
        <div id="comparison-output" class="output"></div>
    </div>

    <!-- Operatory Logiczne -->
    <div class="section">
        <h2>3. Operatory logiczne</h2>
        <button class="toggle-button" onclick="toggleInput('logical')">Oblicz operacje logiczne</button>
        <div id="logical" class="input-container">
            <input type="number" id="lognum1" placeholder="Podaj liczbę A" />
            <input type="number" id="lognum2" placeholder="Podaj liczbę B" />
            <button onclick="calculateLogical()">Oblicz</button>
        </div>
        <div id="logical-output" class="output"></div>
    </div>

    <!-- Operatory Przypisania -->
    <div class="section">
        <h2>4. Operatory przypisania</h2>
        <button class="toggle-button" onclick="toggleInput('assignment')">Oblicz operacje przypisania</button>
        <div id="assignment" class="input-container">
            <input type="number" id="assignnum1" placeholder="Podaj liczbę A" />
            <button onclick="calculateAssignment()">Oblicz</button>
        </div>
        <div id="assignment-output" class="output"></div>
    </div>

    <!-- Operatory Inkrementacji / Dekrementacji -->
    <div class="section">
        <h2>5. Operatory inkrementacji i dekrementacji</h2>
        <button class="toggle-button" onclick="toggleInput('increment')">Inkrementuj i dekrementuj</button>
        <div id="increment" class="input-container">
            <input type="number" id="incnum" placeholder="Podaj liczbę" />
            <button onclick="incrementDecrement()">Oblicz</button>
        </div>
        <div id="increment-output" class="output"></div>
    </div>

    <!-- Rzutowanie typów -->
    <div class="section">
        <h2>6. Operator typu (rzutowanie)</h2>
        <button class="toggle-button" onclick="toggleInput('typecast')">Rzutuj typ</button>
        <div id="typecast" class="input-container">
            <input type="number" id="castnum" placeholder="Podaj liczbę" />
            <button onclick="typeCast()">Rzutuj</button>
        </div>
        <div id="typecast-output" class="output"></div>
    </div>

    <script>
        // Toggle visibility of input container
        function toggleInput(id) {
            var inputContainer = document.getElementById(id);
            inputContainer.style.display = (inputContainer.style.display === 'none' || inputContainer.style.display === '') ? 'block' : 'none';
        }

        // Calculate arithmetic operations: sum and difference
        function calculateArithmetic() {
            var num1 = parseFloat(document.getElementById('num1').value);
            var num2 = parseFloat(document.getElementById('num2').value);
            if (isNaN(num1) || isNaN(num2)) {
                alert("Proszę wprowadzić liczby!");
                return;
            }

            var sum = num1 + num2;
            var difference = num1 - num2;

            var output = document.getElementById('arithmetics-output');
            output.style.display = 'block';
            output.innerHTML = `Suma: ${sum} <br> Różnica: ${difference}`;
        }

        // Compare numbers
        function compareNumbers() {
            var num1 = parseFloat(document.getElementById('comp1').value);
            var num2 = parseFloat(document.getElementById('comp2').value);
            if (isNaN(num1) || isNaN(num2)) {
                alert("Proszę wprowadzić liczby!");
                return;
            }

            var result = "";
            if (num1 == num2) {
                result = "Liczby są równe.";
            } else if (num1 > num2) {
                result = "Liczba A jest większa od liczby B.";
            } else {
                result = "Liczba A jest mniejsza od liczby B.";
            }

            var output = document.getElementById('comparison-output');
            output.style.display = 'block';
            output.innerHTML = result;
        }

        // Calculate logical operations
        function calculateLogical() {
            var num1 = parseFloat(document.getElementById('lognum1').value);
            var num2 = parseFloat(document.getElementById('lognum2').value);
            if (isNaN(num1) || isNaN(num2)) {
                alert("Proszę wprowadzić liczby!");
                return;
            }

            var and = (num1 > 5 && num2 < 10);
            var or = (num1 > 5 || num2 < 10);
            var not = !(num1 > 5);

            var output = document.getElementById('logical-output');
            output.style.display = 'block';
            output.innerHTML = `AND: ${and} <br> OR: ${or} <br> NOT: ${not}`;
        }

        // Calculate assignment operations
        function calculateAssignment() {
            var num1 = parseFloat(document.getElementById('assignnum1').value);
            if (isNaN(num1)) {
                alert("Proszę wprowadzić liczbę!");
                return;
            }

            var result = num1;
            result += 5;
            result -= 3;
            result *= 2;
            result /= 4;

            var output = document.getElementById('assignment-output');
            output.style.display = 'block';
            output.innerHTML = `Wynik operacji przypisania: ${result}`;
        }

        // Incrementation and Decrementation
        function incrementDecrement() {
            var num = parseFloat(document.getElementById('incnum').value);
            if (isNaN(num)) {
                alert("Proszę wprowadzić liczbę!");
                return;
            }

            var incremented = num++;
            var decremented = num--;

            var output = document.getElementById('increment-output');
            output.style.display = 'block';
            output.innerHTML = `Po inkrementacji: ${incremented} <br> Po dekrementacji: ${decremented}`;
        }

        // Type casting
        function typeCast() {
            var num = parseFloat(document.getElementById('castnum').value);
            if (isNaN(num)) {
                alert("Proszę wprowadzić liczbę!");
                return;
            }

            var castedInt = (int)num;
            var castedBool = (num > 0);

            var output = document.getElementById('typecast-output');
            output.style.display = 'block';
            output.innerHTML = `Rzutowanie na int: ${castedInt} <br> Rzutowanie na bool: ${castedBool}`;
        }
    </script>

</body>
</html>
