
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025/2026</title>
 <style>
    html{  
    text-align:center;
      color:red;
      font-size:35px;
      font-family: "Lato", sans-serif;
      background-color: #121212; /* bardzo ciemne tło */
  background-image: repeating-linear-gradient(
    45deg,                /* kąt pasków */
    rgba(255, 255, 255, 0.05), /* jasne paski, bardzo subtelne */
    rgba(255, 255, 255, 0.05) 10px,
    transparent 10px,
    transparent 20px
  );
  background-repeat: repeat;
  background-size: 40px 40px; /* rozmiar wzoru */
  color: white; /* dla czytelności tekstu */

    
      }
   

    a{
      text-decoration:none;
      color:white;
      }
    h1{
      color:#47d6ca;
       font-size:54px;
  
      }
   #controlBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 140px;
    background: #000;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    z-index: 9999;
    user-select: none;
  }
  #controlBox button {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #controlBox button:hover {
    background: #555;
  }
  /* Wysoki kontrast */
  .high-contrast {
    background-color: #000 !important;
    color: #fff !important;
  }
  .high-contrast a {
    color: #0ff !important;
  }
   h1 {
      margin-bottom: 5px;
    }
    .code {
      font-family: monospace;
      background: #222;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      margin-bottom: 10px;
      user-select: text;
    }
    .output {
      margin-bottom: 30px;
      padding-left: 10px;
      border-left: 3px solid #0ff;
    </style>
  

<body>
  <script>
  alert("Witaj na stronie!");

  function addExample(title, code, outputText) {
    const titleEl = document.createElement('h1');
    titleEl.textContent = title;
    document.body.appendChild(titleEl);

    const codeEl = document.createElement('div');
    codeEl.className = 'code';
    codeEl.textContent = code;
    document.body.appendChild(codeEl);

    const outputEl = document.createElement('div');
    outputEl.className = 'output';
    outputEl.textContent = outputText;
    document.body.appendChild(outputEl);
  }

  // 1. alert
  addExample(
    "Alert - wyświetla okno z komunikatem",
    'alert("Witaj na stronie!")',
    "Wyświetiono alert z powyższym komunikatem."
  );

  // 2. console.log
  console.log("To jest komunikat w konsoli.");
  addExample(
    "Console.log - wypisuje tekst do konsoli",
    'console.log("To jest komunikat w konsoli.")',
    'Sprawdź konsolę przeglądarki, tam pojawił się komunikat: "To jest komunikat w konsoli."'
  );

  // 3. document.write - zamiast document.write użyjemy innerHTML, bo document.write nadpisuje stronę
  const docWriteHTML = "<h2>Tekst wstawiony przez document.write()</h2>";
  const docWriteDiv = document.createElement('div');
  docWriteDiv.innerHTML = docWriteHTML;
  document.body.appendChild(docWriteDiv);

  addExample(
    "Document.write - wstawia HTML do dokumentu",
    'document.write("<h2>Tekst wstawiony przez document.write()</h2>")',
    "Poniżej symulacja document.write (dodany element H2):"
  );

  // 4. innerHTML
  const divHTML = document.createElement('div');
  divHTML.innerHTML = "<p>Przykładowy <strong>tekst</strong> w divie.</p>";
  document.body.appendChild(divHTML);

  addExample(
    "innerHTML - zwraca zawartość HTML elementu",
    'element.innerHTML',
    'innerHTML elementu to: ' + divHTML.innerHTML
  );

  // 5. innerText
  addExample(
    "innerText - zwraca tekst widoczny (bez tagów HTML)",
    'element.innerText',
    'innerText elementu to: ' + divHTML.innerText
  );

</script>

</body>
</html>
