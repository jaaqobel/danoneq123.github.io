
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025/2026</title>
 <style>
    html{  
    text-align:center;
      color:red;
      font-size:35px;
      font-family: "Lato", sans-serif;
      background-color: #121212; /* bardzo ciemne tło */
  background-image: repeating-linear-gradient(
    45deg,                /* kąt pasków */
    rgba(255, 255, 255, 0.05), /* jasne paski, bardzo subtelne */
    rgba(255, 255, 255, 0.05) 10px,
    transparent 10px,
    transparent 20px
  );
  background-repeat: repeat;
  background-size: 40px 40px; /* rozmiar wzoru */
  color: white; /* dla czytelności tekstu */

    
      }
   

    a{
      text-decoration:none;
      color:white;
      }
    h1{
      color:#47d6ca;
       font-size:54px;
  
      }
   #controlBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 140px;
    background: #000;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    z-index: 9999;
    user-select: none;
  }
  #controlBox button {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #controlBox button:hover {
    background: #555;
  }
  /* Wysoki kontrast */
  .high-contrast {
    background-color: #000 !important;
    color: #fff !important;
  }
  .high-contrast a {
    color: #0ff !important;
  }
    </style>
  <script>
  // 1. Alert na start
  alert("Witaj na stronie!");

  // 2. Wypisanie informacji do konsoli
  console.log("To jest komunikat w konsoli.");

  // 3. Wstawienie tekstu do strony (UWAGA: document.write nadpisuje całą stronę, więc stosuj na początku ładowania)
  document.write("<h2>To jest tekst wstawiony przez document.write()</h2>");

  // 4. Przykład użycia innerHTML i innerText:
  // Tworzymy element div, dodajemy do body, potem pokazujemy jego zawartość w konsoli
  const div = document.createElement("div");
  div.innerHTML = "<p>To jest <strong>przykładowy</strong> tekst w divie.</p>";
  document.body.appendChild(div);

  console.log("innerHTML div-a:", div.innerHTML);
  console.log("innerText div-a:", div.innerText);
</script>

<body>
  <h1>Nowa strona do informatyki z Panem Jarkiem Szkabarnickim</h1>
 <a href="index.html">powrot</a>
</body>
</html>
