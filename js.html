
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025/2026</title>
 <style>
    html{  
    text-align:center;
      color:red;
      font-size:35px;
      font-family: "Lato", sans-serif;
      background-color: #121212; /* bardzo ciemne tło */
  background-image: repeating-linear-gradient(
    45deg,                /* kąt pasków */
    rgba(255, 255, 255, 0.05), /* jasne paski, bardzo subtelne */
    rgba(255, 255, 255, 0.05) 10px,
    transparent 10px,
    transparent 20px
  );
  background-repeat: repeat;
  background-size: 40px 40px; /* rozmiar wzoru */
  color: white; /* dla czytelności tekstu */

    
      }
   

    a{
      text-decoration:none;
      color:white;
      }
    h1{
      color:#47d6ca;
       font-size:54px;
  
      }
   #controlBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 140px;
    background: #000;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    z-index: 9999;
    user-select: none;
  }
  #controlBox button {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }
  #controlBox button:hover {
    background: #555;
  }
  /* Wysoki kontrast */
  .high-contrast {
    background-color: #000 !important;
    color: #fff !important;
  }
  .high-contrast a {
    color: #0ff !important;
  }
    </style>
  <script>
  // 1. Alert
  alert("Witaj na stronie!");

  // Tworzymy funkcję, która dodaje opis i kod na stronę w formie nagłówków H1
  function addExample(title, code, outputFunc) {
    // Dodajemy tytuł
    const titleEl = document.createElement('h1');
    titleEl.textContent = title;
    document.body.appendChild(titleEl);

    // Dodajemy komendę
    const codeEl = document.createElement('h1');
    codeEl.style.fontWeight = 'normal';
    codeEl.style.fontSize = '16px';
    codeEl.style.fontFamily = 'monospace';
    codeEl.textContent = code;
    document.body.appendChild(codeEl);

    // Wywołujemy funkcję outputową, jeśli jest
    if (typeof outputFunc === 'function') {
      outputFunc();
    }
  }

  // Przykłady:
  addExample(
    "Alert - wyświetla okno z komunikatem",
    'alert("Witaj na stronie!")',
    null
  );

  addExample(
    "Console.log - wypisuje tekst do konsoli",
    'console.log("To jest komunikat w konsoli.")',
    () => console.log("To jest komunikat w konsoli.")
  );

  addExample(
    "Document.write - wstawia HTML do dokumentu",
    'document.write("<h2>Tekst wstawiony przez document.write()</h2>")',
    () => {
      // Uwaga: document.write nadpisuje całą stronę, więc zamiast go używać tutaj,
      // pokażemy alternatywę z innerHTML:
      const dw = document.createElement('div');
      dw.innerHTML = "<h2>Tekst wstawiony przez document.write()</h2>";
      document.body.appendChild(dw);
    }
  );

  addExample(
    "innerHTML - zwraca zawartość HTML elementu",
    'element.innerHTML',
    () => {
      const div = document.createElement("div");
      div.innerHTML = "<p>Przykładowy <strong>tekst</strong> w divie.</p>";
      document.body.appendChild(div);

      const result = div.innerHTML;
      const resEl = document.createElement('p');
      resEl.textContent = "innerHTML zwraca: " + result;
      document.body.appendChild(resEl);
    }
  );

  addExample(
    "innerText - zwraca tekst widoczny (bez tagów HTML)",
    'element.innerText',
    () => {
      const div = document.createElement("div");
      div.innerHTML = "<p>Przykładowy <strong>tekst</strong> w divie.</p>";
      document.body.appendChild(div);

      const result = div.innerText;
      const resEl = document.createElement('p');
      resEl.textContent = "innerText zwraca: " + result;
      document.body.appendChild(resEl);
    }
  );
</script>

</html>
