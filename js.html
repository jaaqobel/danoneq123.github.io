<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2025/2026</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    padding: 20px;
  }
  #examples div {
    margin-bottom: 20px;
    border-left: 3px solid #0ff;
    padding-left: 10px;
  }
  .code {
    background: #222;
    padding: 8px;
    border-radius: 4px;
    font-family: monospace;
    margin-bottom: 8px;
    white-space: pre-wrap;
  }
  button {
    padding: 8px 12px;
    background: #0ff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    color: #000;
  }
  button:hover {
    background: #0cc;
  }
  #bluescreen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0000AA;
    color: white;
    font-family: "Courier New", monospace;
    font-size: 18px;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
  }
  .bsod-text {
    max-width: 600px;
    padding: 20px;
    text-align: left;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>Przykłady JavaScript</h1>

  <div id="examples"></div>

  <div id="bluescreen">
    <div class="bsod-text">
      😵‍💫 Wystąpił problem i system musi zostać zrestartowany.<br><br>
      Kod błędu: JS_FAKE_BSOD<br>
      Naciśnij dowolny klawisz, aby kontynuować...
    </div>
  </div>

<script>
  function showFakeBSOD() {
    const bs = document.getElementById('bluescreen');
    bs.style.display = 'flex';

    window.addEventListener('keydown', () => {
      bs.style.display = 'none';
    }, { once: true });
  }

  function addExample(title, code, setupFunc, runFunc) {
    const container = document.createElement("div");

    const header = document.createElement("h2");
    header.textContent = title;
    container.appendChild(header);

    const codeBox = document.createElement("div");
    codeBox.className = "code";
    codeBox.textContent = code;
    container.appendChild(codeBox);

    const output = document.createElement("div");
    container.appendChild(output);

    const button = document.createElement("button");
    button.textContent = "Uruchom";
    button.onclick = () => {
      if(runFunc) runFunc(output);
    };
    container.appendChild(button);

    if(setupFunc) setupFunc(output);

    document.getElementById("examples").appendChild(container);
  }

  addExample(
    "Alert - wyświetla okno z komunikatem",
    'alert("Witaj na stronie!")',
    null,
    () => alert("To jest działający alert!")
  );

  addExample(
    "Console.log - wypisuje tekst do konsoli",
    'console.log("To jest komunikat w konsoli.")',
    (out) => { out.textContent = "Kliknij przycisk, aby zobaczyć komunikat w konsoli przeglądarki."; },
    () => console.log("To jest komunikat w konsoli.")
  );

  addExample(
    "Fake BSOD - symulacja błędu systemu",
    'showFakeBSOD()',
    (out) => { out.textContent = "Kliknij przycisk, aby zasymulować ekran błędu (Blue Screen)."; },
    () => showFakeBSOD()
  );
</script>
</body>
</html>
