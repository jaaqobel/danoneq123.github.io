<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025/2026</title>
  <style>
    html {
      text-align: center;
      font-size: 35px;
      font-family: "Lato", sans-serif;
      background-color: #121212;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.05),
        rgba(255, 255, 255, 0.05) 10px,
        transparent 10px,
        transparent 20px
      );
      background-size: 40px 40px;
      color: white;
    }

    a {
      text-decoration: none;
      color: white;
    }

    h1 {
      color: #47d6ca;
      font-size: 54px;
      margin-bottom: 5px;
    }

    .code {
      font-family: monospace;
      background: #222;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      margin-bottom: 10px;
      user-select: text;
      white-space: pre-wrap;
    }

    .output {
      margin-bottom: 30px;
      padding-left: 10px;
      border-left: 3px solid #0ff;
    }

    button {
      background: #0ff;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: bold;
      color: #000;
      margin-bottom: 10px;
    }

    button:hover {
      background: #0cc;
    }

    #bluescreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0000AA;
      color: white;
      font-family: "Courier New", monospace;
      font-size: 18px;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .bsod-text {
      max-width: 600px;
      padding: 20px;
      text-align: left;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <h1>Przykłady JavaScript</h1>

  <div id="examples"></div>

  <!-- BSOD FAKE SCREEN -->
  <div id="bluescreen">
    <div class="bsod-text">
      😵‍💫 Wystąpił problem i system musi zostać zrestartowany.<br><br>
      Kod błędu: JS_FAKE_BSOD<br>
      Naciśnij dowolny klawisz, aby kontynuować...
    </div>
  </div>

  <script>
    // Funkcja wyświetlająca "blue screen"
    function showFakeBSOD() {
      const bs = document.getElementById('bluescreen');
      bs.style.display = 'flex';

      // Przywróć stronę po naciśnięciu klawisza
      window.addEventListener('keydown', () => {
        bs.style.display = 'none';
      }, { once: true });
    }

    // Funkcja dodająca przykład
    function addExample(title, code, setupFunc, runFunc) {
      const container = document.createElement("div");
      container.className = "output";

      const header = document.createElement("h2");
      header.textContent = title;
      container.appendChild(header);

      const codeBox = document.createElement("div");
      codeBox.className = "code";
      codeBox.textContent = code;
      container.appendChild(codeBox);

      const result = document.createElement("div");
      container.appendChild(result);

      const button = document.createElement("button");
      button.textContent = "Uruchom";
      button.onclick = () => {
        if (runFunc) runFunc(result);
      };
      container.appendChild(button);

      if (setupFunc) setupFunc(result);

      document.getElementById("examples").appendChild(container);
    }

    // 1. Alert
    addExample(
      "Alert - wyświetla okno z komunikatem",
      'alert("Witaj na stronie!")',
      null,
      () => alert("To jest działający alert!")
    );

    // 2. Console.log
    addExample(
      "Console.log - wypisuje tekst do konsoli",
      'console.log("To jest komunikat w konsoli.")',
      (out) => {
        out.textContent = "Kliknij przycisk, aby zobaczyć komunikat w konsoli przeglądarki.";
      },
      () => console.log("To jest komunikat w konsoli.")
    );

    // 3. Document.write (symulacja)
    addExample(
      "Document.write - wstawia HTML do dokumentu",
      'document.write("<h2>Tekst wstawiony przez document.write()</h2>")',
      null,
      (out) => {
        out.innerHTML = "<h2>Tekst wstawiony przez symulację document.write()</h2>";
      }
    );
