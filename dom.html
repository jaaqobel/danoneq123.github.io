<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>DOM – Lightbox & Slider</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin-top: 40px;
}

h2 {
  color: #333;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background-color: #0078d7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #005fa3;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  width: 240px;
}

/* GALERIA */
.gallery {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.gallery img {
  width: 140px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  cursor: pointer;
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#lightbox img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 15px;
}

/* DYNAMICZNE ELEMENTY */
.box {
  width: 200px;
  height: 200px;
  margin: 20px auto;
  background-color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h2>Galeria – Lightbox + Slider</h2>

<div class="gallery">
  <img src="https://picsum.photos/id/1015/600/400">
  <img src="https://picsum.photos/id/1025/600/400">
  <img src="https://picsum.photos/id/1035/600/400">
</div>

<div id="lightbox">
  <img id="bigImage">
  <div>
    <button id="prev">◀</button>
    <button id="close">X</button>
    <button id="next">▶</button>
  </div>
</div>

<h2>Tworzenie elementów DOM</h2>

<input type="text" id="customText" placeholder="Wpisz treść elementu">

<br>

<button id="addCustom">Dodaj na koniec</button>
<button id="addBefore">Dodaj na początek</button>
<button id="removeFirst">Usuń pierwszy</button>
<button id="removeLast">Usuń ostatni</button>

<!-- NOWOŚĆ: przyciski zmiany tła -->
<br>
<button id="bgBody">Zmień tło strony</button>
<button id="bgBoxes">Zmień kolor wszystkich kwadratów</button>

<div id="container"></div>

<script>
// ===== LIGHTBOX =====
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const bigImage = document.getElementById("bigImage");
let index = 0;

images.forEach((img, i) => {
  img.addEventListener("click", () => {
    index = i;
    bigImage.src = images[index].src;
    lightbox.style.display = "flex";
  });
});

document.getElementById("close").onclick = () => {
  lightbox.style.display = "none";
};

document.getElementById("next").onclick = () => {
  index = (index + 1) % images.length;
  bigImage.src = images[index].src;
};

document.getElementById("prev").onclick = () => {
  index = (index - 1 + images.length) % images.length;
  bigImage.src = images[index].src;
};

// ===== DOM =====
const container = document.getElementById("container");
const input = document.getElementById("customText");

// ===== LOSOWY KOLOR =====
function getRandomColor() {
  const letters = '0123456789ABCDEF';
  let color = '#';
  for (let i = 0; i < 6; i++) {
    color += letters[Math.floor(Math.random() * 16)];
  }
  return color;
}

// ===== FUNKCJA DODAJĄCA ZDARZENIA DO BOXA =====
function addBoxEvents(box) {
  box.addEventListener("click", () => {
    // zmień kolor klikniętego boxa
    box.style.backgroundColor = getRandomColor();
    // zmień kolor ostatniego boxa, jeśli nie jest tym samym
    if (container.lastChild && container.lastChild !== box) {
      container.lastChild.style.backgroundColor = getRandomColor();
    }
  });
}

// ===== TWORZENIE BOXA =====
function createBox(text) {
  const div = document.createElement("div");
  div.className = "box";
  div.textContent = text;
  addBoxEvents(div);
  return div;
}

// dodaj na koniec
document.getElementById("addCustom").onclick = () => {
  if (input.value.trim() === "") return;
  container.appendChild(createBox(input.value));
  input.value = "";
};

// dodaj na początek
document.getElementById("addBefore").onclick = () => {
  if (input.value.trim() === "") return;
  container.prepend(createBox(input.value));
  input.value = "";
};

// usuń pierwszy
document.getElementById("removeFirst").onclick = () => {
  if (container.firstChild) {
    container.removeChild(container.firstChild);
  }
};

// usuń ostatni
document.getElementById("removeLast").onclick = () => {
  if (container.lastChild) {
    container.removeChild(container.lastChild);
  }
};

// ===== ZMIANA TŁA =====
document.getElementById("bgBody").onclick = () => {
  document.body.style.backgroundColor = getRandomColor();
};

// NOWOŚĆ: zmiana koloru wszystkich kwadratów
document.getElementById("bgBoxes").onclick = () => {
  const boxes = container.querySelectorAll(".box");
  boxes.forEach(box => {
    box.style.backgroundColor = getRandomColor();
  });
};
</script>

</body>
</html>
