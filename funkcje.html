<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktywne Funkcje JavaScript</title>
    <link rel="icon" type="image/x-icon" href="../image/icon.png">
    <link rel="stylesheet" href="../style2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #2c2c2c;
            margin: 0;
            padding: 0;
            display: flex; /* Użycie flexboxa */
            justify-content: center;
            align-items: flex-start; /* Wyrównanie do góry */
            min-height: 100vh;
            flex-direction: row; /* Ustawienie elementów w poziomie */
            color: #f5f5f5;
        }

        .left {
            width: 60%; /* Lewa strona zajmuje 60% szerokości */
            padding: 20px;
            background-color: #333333;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-top: 30px;
            overflow: hidden;
            text-align: center;
        }

        .right {
            width: 40%; /* Prawa strona zajmuje 40% szerokości */
            background: url("giphy.gif") no-repeat center center fixed; /* Zmienna ścieżka */
            background-size: cover; /* Dopasowanie rozmiaru tła do rozmiaru ekranu */
            height: 100vh; /* Pełna wysokość widoku */
            margin-top: 30px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            color: #4CAF50;
        }

        h2, h3 {
            color: #f5f5f5;
        }

        .nav {
            color: #4CAF50;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 20px;
            display: block;
            text-align: center;
        }

        .nav:hover {
            text-decoration: underline;
        }

        .area-text {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #555;
            border-radius: 5px;
            margin-bottom: 15px;
            min-height: 100px;
            resize: vertical;
            background-color: #444;
            color: #f5f5f5;
        }

        .nav-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .nav-button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #444;
            border-radius: 5px;
            font-size: 16px;
            color: #f5f5f5;
        }

        footer {
            font-size: 10px;
            color: rgb(180, 180, 180);
            text-align: center;
            margin-top: 20px;
        }

        footer a {
            color: #4CAF50;
        }
    </style>
</head>

<body>

    <div class="left">
        <h1>Interaktywne Funkcje JavaScript</h1>
        <a href="index.html" class="nav">powrót ;(</a>
        <hr>
        <h2>Funkcje</h2>

        <!-- Przykłady funkcji -->
        <h3>1. Prompt + Alert</h3>
        <textarea class="area-text" rows="10" readonly>
function examplePrompt() {
    const name = prompt("Jak masz na imię?");
    alert("Cześć, " + name + "!");
}
        </textarea><br>
        <button onclick="examplePrompt()" class="nav-button">Sprawdź</button>
        <div id="result-prompt" class="result"></div>

        <!-- ... (Pozostałe funkcje są takie same) -->

        <h3>7. Prosta funkcja sumująca</h3>
        <textarea class="area-text" rows="10" readonly>
function exampleSum() {
    const a = parseFloat(prompt("Podaj pierwszą liczbę:"));
    const b = parseFloat(prompt("Podaj drugą liczbę:"));
    if (isNaN(a) || isNaN(b)) {
        alert("Podano nieprawidłową liczbę.");
        return;
    }
    alert("Suma wynosi: " + (a + b));
}
        </textarea><br>
        <button onclick="exampleSum()" class="nav-button">Sprawdź</button>
        <div id="result-sum" class="result"></div>
    </div>

    <div class="right">
        <!-- Miejsce na GIF -->
        <img src="path_to_your_gif.gif" alt="Interaktywny GIF" style="max-width: 100%; height: auto;">
    </div>

    <script>
        // Funkcje JavaScript
        function examplePrompt() {
            const name = prompt("Jak masz na imię?");
            document.getElementById('result-prompt').innerText = "Cześć, " + name + "!";
        }

        function exampleConfirm() {
            const answer = confirm("Czy lubisz JavaScript?");
            const result = answer ? "Super, że lubisz JavaScript!" : "Szkoda, może się przekonasz.";
            document.getElementById('result-confirm').innerText = result;
        }

        function exampleParseInt() {
            const input = prompt("Podaj liczbę całkowitą:");
            const number = parseInt(input);
            document.getElementById('result-parseint').innerText = "Wczytana liczba całkowita to: " + number;
        }

        function exampleParseFloat() {
            const input = prompt("Podaj liczbę zmiennoprzecinkową:");
            const number = parseFloat(input);
            document.getElementById('result-parsefloat').innerText = "Wczytana liczba to: " + number;
        }

        function exampleNumber() {
            const input = prompt("Podaj coś do konwersji na liczbę:");
            const number = Number(input);
            document.getElementById('result-number').innerText = "Wynik konwersji to: " + number;
        }

        function exampleIsNaN() {
            const input = prompt("Podaj coś do sprawdzenia czy to liczba:");
            const result = isNaN(input) ? "To NIE jest liczba!" : "To jest liczba.";
            document.getElementById('result-isnan').innerText = result;
        }

        function exampleSum() {
            const a = parseFloat(prompt("Podaj pierwszą liczbę:"));
            const b = parseFloat(prompt("Podaj drugą liczbę:"));
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result-sum').innerText = "Podano nieprawidłową liczbę.";
                return;
            }
            document.getElementById('result-sum').innerText = "Suma wynosi: " + (a + b);
        }
    </script>

</body>

</html>
