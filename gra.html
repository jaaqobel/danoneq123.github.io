<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neo Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: radial-gradient(circle at center, #0f0f1a, #050510);
    font-family: 'Orbitron', sans-serif;
}

#gameCanvas {
    border: 2px solid #00f7ff;
    background-color: #0a0a14;
    box-shadow: 0 0 25px #00f7ff;
}

#gameOver {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    background: rgba(10, 10, 20, 0.95);
    border: 2px solid #ff00cc;
    box-shadow: 0 0 25px #ff00cc;
    position: absolute;
    color: #00f7ff;
    text-align: center;
}

button {
    padding: 12px 25px;
    margin-top: 20px;
    background: transparent;
    border: 2px solid #00f7ff;
    color: #00f7ff;
    cursor: pointer;
}

button:hover {
    background: #00f7ff;
    color: #0a0a14;
}
</style>
</head>

<body>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<div id="gameOver">
    <h2>GAME OVER</h2>
    <p>Twój wynik: <span id="currentScore">0</span></p>
    <p>Najlepszy wynik: <span id="bestScore">0</span></p>
    <button id="restartButton">Zagraj ponownie</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const box = 20;
let snake;
let direction;
let food;
let score;
let bestScore = localStorage.getItem('bestScore') 
    ? parseInt(localStorage.getItem('bestScore')) 
    : 0;
let game;

/* 🔊 DŹWIĘKI */
const eatSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const gameOverSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

/* 🔥 LOSOWE NEONOWE KOLORY */
function getRandomNeonColor() {
    const colors = ["#ff00cc", "#00f7ff", "#ffea00", "#00ff6a", "#ff6a00", "#ff004c"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function startGame() {
    snake = [{x: 300, y: 300}];
    direction = "UP";
    food = generateFood();
    score = 0;

    document.getElementById('gameOver').style.display = "none";

    clearInterval(game);
    game = setInterval(draw, 150);
}

function generateFood() {
    let newFood;
    do {
        newFood = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
    } while (snake.some(segment => 
        segment.x === newFood.x && segment.y === newFood.y
    ));
    return newFood;
}

function drawApple(x, y) {
    ctx.shadowColor = "#ff004c";
    ctx.shadowBlur = 20;
    ctx.fillStyle = "#ff004c";
    ctx.beginPath();
    ctx.arc(x + box/2, y + box/2, box/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawSnake() {
    snake.forEach((segment, i) => {
        let color, shadow, blur;
        if (i === 0) {
            color = "#ff00cc"; // głowa
            shadow = "#ff00cc";
            blur = 25;
        } else {
            color = getRandomNeonColor(); // segmenty
            shadow = color;
            blur = 15;
        }
        ctx.fillStyle = color;
        ctx.shadowColor = shadow;
        ctx.shadowBlur = blur;
        ctx.fillRect(segment.x, segment.y, box, box);
        ctx.shadowBlur = 0;
    });
}

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    if ((key === "arrowup" || key === "w") && direction !== "DOWN") direction = "UP";
    if ((key === "arrowdown" || key === "s") && direction !== "UP") direction = "DOWN";
    if ((key === "arrowleft" || key === "a") && direction !== "RIGHT") direction = "LEFT";
    if ((key === "arrowright" || key === "d") && direction !== "LEFT") direction = "RIGHT";
});

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawApple(food.x, food.y);
    drawSnake();

    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    const collisionWithSelf = snake.slice(1).some(segment =>
        segment.x === snakeX && segment.y === snakeY
    );

    if (
        snakeX < 0 ||
        snakeY < 0 ||
        snakeX >= canvas.width ||
        snakeY >= canvas.height ||
        collisionWithSelf
    ) {
        clearInterval(game);
        gameOverSound.currentTime = 0;
        gameOverSound.play().catch(() => {});

        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("bestScore", bestScore);
        }

        document.getElementById("currentScore").innerText = score;
        document.getElementById("bestScore").innerText = bestScore;
        document.getElementById("gameOver").style.display = "flex";
        return;
    }

    if (snakeX === food.x && snakeY === food.y) {
        eatSound.currentTime = 0;
        eatSound.play().catch(() => {});
        food = generateFood();
        score++;
    } else {
        snake.pop();
    }

    snake.unshift({x: snakeX, y: snakeY});
}

startGame();
document.getElementById("restartButton").addEventListener("click", startGame);
</script>

</body>
</html>
