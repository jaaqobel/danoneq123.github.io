<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Neo Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: radial-gradient(circle at center, #0f0f1a, #050510);
    font-family: 'Orbitron', sans-serif;
}
#gameCanvas {
    border: 2px solid #00f7ff;
    background-color: #0a0a14;
    box-shadow: 0 0 25px #00f7ff;
}
#gameOver {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    background: rgba(10, 10, 20, 0.95);
    border: 2px solid #ff00cc;
    box-shadow: 0 0 25px #ff00cc;
    position: absolute;
    color: #00f7ff;
    text-align: center;
}
button {
    padding: 12px 25px;
    margin-top: 20px;
    background: transparent;
    border: 2px solid #00f7ff;
    color: #00f7ff;
    cursor: pointer;
}
button:hover {
    background: #00f7ff;
    color: #0a0a14;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<div id="gameOver">
    <h2>GAME OVER</h2>
    <p>Twój wynik: <span id="currentScore">0</span></p>
    <p>Najlepszy wynik: <span id="bestScore">0</span></p>
    <button id="restartButton">Zagraj ponownie</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const box = 20;
let snake = [];
let snakeColors = [];
let direction;
let nextDirection;
let food;
let score = 0;
let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : 0;
let game;

function startGame() {
    snake = [{x: 300, y: 300}];
    snakeColors = ["#ffea00"];
    direction = "UP";
    nextDirection = "UP";
    food = generateFood();
    score = 0;
    document.getElementById('gameOver').style.display = "none";
    clearInterval(game);
    game = setInterval(draw, 150);
}

function generateFood() {
    let newFood;
    do {
        newFood = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
    } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
    return newFood;
}

function drawApple(x, y) {
    ctx.shadowColor = "#ff004c";
    ctx.shadowBlur = 20;
    ctx.fillStyle = "#ff004c";
    ctx.beginPath();
    ctx.arc(x + box/2, y + box/2, box/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawSnake() {
    snake.forEach((segment, i) => {
        const color = snakeColors[i] || "#00f7ff";
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = i === 0 ? 25 : 15;
        ctx.fillRect(segment.x, segment.y, box, box);
        ctx.shadowBlur = 0;
    });
}

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    if ((key === "arrowup" || key === "w") && direction !== "DOWN") nextDirection = "UP";
    if ((key === "arrowdown" || key === "s") && direction !== "UP") nextDirection = "DOWN";
    if ((key === "arrowleft" || key === "a") && direction !== "RIGHT") nextDirection = "LEFT";
    if ((key === "arrowright" || key === "d") && direction !== "LEFT") nextDirection = "RIGHT";
});

function draw() {
    direction = nextDirection;
    let headX = snake[0].x;
    let headY = snake[0].y;

    if (direction === "UP") headY -= box;
    if (direction === "DOWN") headY += box;
    if (direction === "LEFT") headX -= box;
    if (direction === "RIGHT") headX += box;

    if (headX < 0 || headY < 0 || headX >= canvas.width || headY >= canvas.height || snake.slice(1).some(s => s.x === headX && s.y === headY)) {
        clearInterval(game);
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("bestScore", bestScore);
        }
        document.getElementById("currentScore").innerText = score;
        document.getElementById("bestScore").innerText = bestScore;
        document.getElementById("gameOver").style.display = "flex";
        return;
    }

    snake.unshift({x: headX, y: headY});
    snakeColors.unshift("#ffea00"); // Głowa zawsze żółta

    if (headX === food.x && headY === food.y) {
        food = generateFood();
        score++;
    } else {
        snake.pop();
        snakeColors.pop();
    }

    snakeColors[0] = "#ffea00"; // upewnij się, że głowa pozostaje żółta
    for (let i = 1; i < snakeColors.length; i++) {
        snakeColors[i] = "#00f7ff"; // reszta niebieska
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawApple(food.x, food.y);
    drawSnake();
}

startGame();
document.getElementById('restartButton').addEventListener('click', startGame);
</script>

</body>
</html>
